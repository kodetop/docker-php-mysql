[PHP]
; File uploads
upload_max_filesize = 64M
post_max_size = 64M

; Memory
memory_limit = 256M

; Execution
max_execution_time = 60
max_input_time = 60

; Error handling (safe defaults for development)
display_errors = On
display_startup_errors = On
log_errors = On
error_reporting = E_ALL

; Timezone
date.timezone = UTC
